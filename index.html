<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>위메이드 브랜드마케팅팀 인사이트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f4f6fb; --white: #ffffff; --accent: #4f5bd5;
      --txt: #1a1f36; --txt-sub: #5a6282; --line: rgba(0,0,0,0.08);
      --up: #e03131; --down: #1971c2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--txt); line-height: 1.5; }
    
    header { background: var(--white); height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); sticky; top: 0; z-index: 100; }
    .logo { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .logo-box { background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
    
    .ticker { background: var(--white); height: 45px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--line); overflow-x: auto; white-space: nowrap; }
    .tk-item { display: flex; align-items: center; gap: 10px; margin-right: 30px; font-size: 13px; }
    .up { color: var(--up); } .dn { color: var(--down); }

    .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
    .card { background: var(--white); border-radius: 12px; border: 1px solid var(--line); overflow: hidden; display: flex; flex-direction: column; }
    .card-hd { padding: 15px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; background: #fafbfc; }
    .card-hd h2 { font-size: 14px; font-weight: 700; }
    
    .news-list { height: 350px; overflow-y: auto; padding: 10px 0; }
    .news-item { padding: 12px 15px; border-bottom: 1px solid #f1f3f5; }
    .news-item:last-child { border-bottom: none; }
    .news-item a { text-decoration: none; color: var(--txt); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
    .news-item a:hover { color: var(--accent); }
    .news-meta { font-size: 11px; color: var(--txt-sub); display: flex; gap: 10px; }

    .btn-ref { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .loading-box { padding: 50px; text-align: center; color: var(--txt-sub); font-size: 13px; }
    .spinning { display: inline-block; animation: rotate 1s linear infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-box">W</span> 브랜드마케팅 인사이트</div>
  <button class="btn-ref" onclick="fetchAll()">↻ 새로고침</button>
</header>

<div class="ticker" id="ticker">데이터 로드 중...</div>

<div class="container">
  <div class="card">
    <div class="card-hd"><h2>🏢 위메이드 소식</h2><span id="upd-wemade" style="font-size:10px; color:#999;"></span></div>
    <div class="news-list" id="body-wemade"><div class="loading-box">로드 중...</div></div>
  </div>
  <div class="card">
    <div class="card-hd"><h2>⛓️ 블록체인 트렌드</h2><span id="upd-blockchain" style="font-size:10px; color:#999;"></span></div>
    <div class="news-list" id="body-blockchain"><div class="loading-box">로드 중...</div></div>
  </div>
  <div class="card">
    <div class="card-hd"><h2>📢 마케팅 인사이트</h2><span id="upd-marketing" style="font-size:10px; color:#999;"></span></div>
    <div class="news-list" id="body-marketing"><div class="loading-box">로드 중...</div></div>
  </div>
</div>

<script>
/* ─── 설정 및 유틸리티 ─── */
const QUERIES = {
  wemade: '위메이드 OR 위믹스 OR "WEMIX"',
  blockchain: '블록체인 Web3 OR NFT 가상자산',
  marketing: '마케팅 트렌드 OR 브랜드 캠페인'
};

const $ = id => document.getElementById(id);

// 2중 프록시 시스템 (실패 시 다른 프록시 사용)
async function fetchWithProxy(url) {
  const proxies = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
  ];

  for (let proxy of proxies) {
    try {
      const res = await fetch(proxy(url));
      if (!res.ok) continue;
      const data = await res.json();
      return data.contents || data; // 프록시마다 응답 구조가 다를 수 있음
    } catch (e) { console.error("Proxy fail, trying next..."); }
  }
  throw new Error("모든 데이터 통로가 차단되었습니다.");
}

/* ─── 주가 정보 로드 ─── */
async function loadStocks() {
  const el = $('ticker');
  try {
    const raw = await fetchWithProxy('https://polling.finance.naver.com/api/realtime/site/stock/get?stockCodes=112040,233180');
    const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
    const items = data.result.areas[0].datas;
    el.innerHTML = items.map(s => `
      <div class="tk-item">
        <b>${s.nm}</b> 
        <span class="${s.cv > 0 ? 'up' : 'dn'}">₩${s.nv.toLocaleString()} (${s.cr > 0 ? '+' : ''}${s.cr}%)</span>
      </div>
    `).join('') + `<span style="font-size:10px; color:#999; margin-left:auto;">${new Date().toLocaleTimeString()}</span>`;
  } catch (e) { el.innerText = "주가 정보를 가져올 수 없습니다."; }
}

/* ─── 뉴스 정보 로드 ─── */
async function loadNews(cat) {
  const body = $(`body-${cat}`);
  const upd = $(`upd-${cat}`);
  try {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(QUERIES[cat])}&hl=ko&gl=KR&ceid=KR:ko`;
    const xmlText = await fetchWithProxy(rssUrl);
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
    
    if (items.length === 0) throw new Error("검색 결과 없음");

    body.innerHTML = items.map(it => {
      const title = it.querySelector("title").textContent;
      const link = it.querySelector("link").textContent;
      const source = it.querySelector("source")?.textContent || "뉴스";
      const date = new Date(it.querySelector("pubDate").textContent).toLocaleDateString();
      return `
        <div class="news-item">
          <a href="${link}" target="_blank">${title}</a>
          <div class="news-meta"><span>${source}</span><span>${date}</span></div>
        </div>
      `;
    }).join('');
    if (upd) upd.innerText = new Date().toLocaleTimeString();
  } catch (e) {
    body.innerHTML = `<div class="loading-box">데이터를 불러오지 못했습니다.</div>`;
  }
}

/* ─── 초기 실행 ─── */
function fetchAll() {
  loadStocks();
  loadNews('wemade');
  loadNews('blockchain');
  loadNews('marketing');
}

// 스크립트가 로드된 후 실행
window.onload = fetchAll;
// 20분마다 자동 갱신
setInterval(fetchAll, 1000 * 60 * 20);
</script>

</body>
</html>
