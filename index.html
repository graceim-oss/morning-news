<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위메이드 모닝 클리핑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1128; --navy-light: #121b3d; --toss-blue: #3182f6;
            --text: #ffffff; --muted: #94a3b8; --border: rgba(255,255,255,0.1);
            --up: #ef4444; --down: #3b82f6; --card: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--navy); color: var(--text); line-height: 1.6; }
        header { padding: 15px 25px; background: var(--navy); border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 18px; font-weight: 700; color: var(--toss-blue); }
        .price-bar { background: var(--navy-light); padding: 12px 25px; display: flex; gap: 30px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .price-item { display: flex; flex-direction: column; min-width: 140px; border-right: 1px solid var(--border); padding-right: 15px; }
        .price-item:last-child { border: none; }
        .price-item .label { font-size: 11px; color: var(--muted); }
        .price-item .val { font-size: 15px; font-weight: 700; }
        main { display: grid; grid-template-columns: 2.2fr 1fr; gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; min-height: 300px; }
        .panel-title { font-size: 17px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .news-item { text-decoration: none; color: inherit; display: block; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-item h4 { font-size: 14px; margin-bottom: 4px; color: #f1f5f9; }
        .news-meta { font-size: 11px; color: var(--muted); }
        .trend-group { margin-bottom: 25px; }
        .trend-group h3 { font-size: 13px; color: var(--toss-blue); margin-bottom: 12px; }
        .trend-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.04); border-radius: 8px; text-decoration: none; color: inherit; font-size: 13px; margin-bottom: 6px; }
        .trend-item .rank { font-weight: 700; color: var(--toss-blue); width: 18px; text-align: center; }
        .up { color: var(--up); } .down { color: var(--down); }
        .loading-text { font-size: 12px; color: var(--muted); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo">WEMADE <span style="color:white">Morning</span></div>
    <div id="current-time">--:--:--</div>
</header>

<div class="price-bar">
    <div class="price-item"><span class="label">위메이드(KRX)</span><span class="val" id="p-wemade"><span class="loading-text">...</span></span></div>
    <div class="price-item"><span class="label">위메이드맥스(KRX)</span><span class="val" id="p-max"><span class="loading-text">...</span></span></div>
    <div class="price-item"><span class="label">WEMIX (Bithumb)</span><span class="val" id="p-wemix"><span class="loading-text">...</span></span></div>
</div>

<main>
    <section class="panel">
        <div class="panel-title">주요 뉴스 📰</div>
        <div id="news-list"><p class="loading-text">최신 뉴스를 가져오고 있습니다...</p></div>
    </section>

    <aside class="panel">
        <div class="panel-title">실시간 트렌드 🔥</div>
        <div class="trend-group">
            <h3>🔍 구글 급상승 검색어</h3>
            <div id="g-trends"><p class="loading-text">데이터 로드 중...</p></div>
        </div>
        <div class="trend-group">
            <h3>📖 나무위키 실시간 검색어</h3>
            <div id="n-trends"><p class="loading-text">데이터 로드 중...</p></div>
        </div>
    </aside>
</main>

<script>
    // 프록시는 뉴스/트렌드 등 외부 도메인에만 사용
    const PROXY = "https://api.allorigins.win/get?url=";

    function updateTime() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('ko-KR', {hour12:false});
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 1. 주가 정보 (업비트/빗썸 API는 CORS 프록시 없이 가능하여 매우 빠름)
    async function fetchPrices() {
        // 위믹스 (빗썸 API 직접 호출 - 프록시 없음)
        try {
            const res = await fetch("https://api.bithumb.com/public/ticker/WEMIX_KRW");
            const data = await res.json();
            const val = data.data;
            const changeRate = ((val.closing_price - val.prev_closing_price) / val.prev_closing_price * 100).toFixed(2);
            const color = changeRate >= 0 ? 'up' : 'down';
            document.getElementById('p-wemix').innerHTML = `${parseInt(val.closing_price).toLocaleString()} <span class="${color}" style="font-size:11px">${changeRate}%</span>`;
        } catch (e) { document.getElementById('p-wemix').innerText = "확인 불가"; }

        // 주식 (네이버 금융은 프록시 필수라 별도 처리)
        const stocks = {'112040':'p-wemade', '233180':'p-max'};
        for (const [code, id] of Object.entries(stocks)) {
            try {
                // 초경량 API 사용
                const res = await fetch(`${PROXY}${encodeURIComponent(`https://polling.finance.naver.com/api/realtime?query=SERVICE_ITEM:${code}`)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents).result.areas[0].datas[0];
                const color = data.cr > 0 ? 'up' : 'down';
                document.getElementById(id).innerHTML = `${data.nv.toLocaleString()} <span class="${color}" style="font-size:11px">${data.cr > 0 ? '+':''}${data.cr}%</span>`;
            } catch (e) { document.getElementById(id).innerText = "로드 지연"; }
        }
    }

    // 2. 뉴스 (Google News RSS)
    async function fetchNews() {
        const q = encodeURIComponent("위메이드 | 위믹스 | 블록체인");
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent(`https://news.google.com/rss/search?q=${q}&hl=ko&gl=KR&ceid=KR:ko`)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
            
            document.getElementById('news-list').innerHTML = items.map(item => {
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                const source = item.querySelector("source").textContent;
                return `
                    <a href="${link}" target="_blank" class="news-item">
                        <h4>${title}</h4>
                        <div class="news-meta">${source}</div>
                    </a>
                `;
            }).join('');
        } catch (e) { document.getElementById('news-list').innerText = "뉴스를 불러올 수 없습니다."; }
    }

    // 3. 트렌드 (구글/나무위키)
    async function fetchTrends() {
        // 구글 트렌드
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent("https://trends.google.co.kr/trending/rss?geo=KR")}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
            document.getElementById('g-trends').innerHTML = items.map((item, i) => `
                <a href="https://www.google.com/search?q=${encodeURIComponent(item.querySelector("title").textContent)}" target="_blank" class="trend-item">
                    <span class="rank">${i+1}</span> ${item.querySelector("title").textContent}
                </a>
            `).join('');
        } catch (e) { document.getElementById('g-trends').innerText = "로드 실패"; }

        // 나무위키 실시간 검색어
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent("https://search.namu.wiki/api/ranking")}`);
            const data = await res.json();
            const items = JSON.parse(data.contents);
            document.getElementById('n-trends').innerHTML = items.slice(0, 10).map((kw, i) => `
                <a href="https://namu.wiki/w/${encodeURIComponent(kw)}" target="_blank" class="trend-item">
                    <span class="rank">${i+1}</span> ${kw}
                </a>
            `).join('');
        } catch (e) { document.getElementById('n-trends').innerText = "데이터 없음"; }
    }

    // 순차적 로드 (주가부터 빨리 띄우기)
    fetchPrices();
    setTimeout(fetchNews, 100);
    setTimeout(fetchTrends, 300);

    // 1분마다 주가 갱신
    setInterval(fetchPrices, 60000);
</script>
</body>
</html>
