<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위메이드 브랜드마케팅 뉴스클리핑</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f1f3f6; --bg-card: #ffffff; --bg-header: #101c40;
            --primary: #3182f6; --text-dark: #222222; --text-gray: #7d7d7d;
            --border: #e6e6e6; --shadow: 0 6px 16px rgba(0,0,0,0.06);
            --font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-body); color: var(--text-dark); -webkit-font-smoothing: antialiased; }
        header { background-color: var(--bg-header); color: white; padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left h1 { font-size: 19px; font-weight: 700; }
        .header-left span { font-weight: 400; color: #a1b0d6; font-size: 17px; }
        .header-right { display: flex; align-items: center; gap: 15px; text-align: right; }
        .current-time { font-size: 20px; font-weight: 700; display: block; }
        .btn-refresh { background-color: rgba(255,255,255,0.08); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 13px; cursor: pointer; }
        main { max-width: 1600px; margin: 30px auto; padding: 0 40px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .card { background-color: var(--bg-card); border-radius: 16px; padding: 25px; box-shadow: var(--shadow); border: 1px solid #e1e3e7; min-height: 420px; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .card-header-left { display: flex; align-items: center; gap: 12px; }
        .category-icon { font-size: 20px; background-color: #f6f8fb; border-radius: 10px; width: 40px; height: 44px; display: flex; justify-content: center; align-items: center; }
        .category-title { font-size: 16px; font-weight: 700; }
        .category-tags { font-size: 11px; color: var(--text-gray); display: block; }
        .update-time { font-size: 11px; color: #a0a8b9; }
        .list-item { text-decoration: none; color: inherit; display: block; padding: 12px 0; border-bottom: 1px solid #f9fafb; }
        .item-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .item-meta { font-size: 11px; color: var(--text-gray); }
        .trend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .trend-list-item { text-decoration: none; color: inherit; padding: 10px; background-color: #f6f8fb; border-radius: 8px; font-size: 13px; display: flex; gap: 10px; }
        .rank { color: var(--primary); font-weight: 700; }
        .loading { color: var(--text-gray); font-size: 13px; padding: 20px 0; text-align: center; }
        .error { color: #ef4444; font-size: 13px; padding: 20px 0; text-align: center; }
        @media (max-width: 1024px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>위메이드 <span>브랜드마케팅 뉴스클리핑</span></h1>
    </div>
    <div class="header-right">
        <div>
            <span id="current-time" class="current-time">00:00:00</span>
        </div>
        <button class="btn-refresh" onclick="refreshAll()">↻ 새로고침</button>
    </div>
</header>

<main>
    <section class="card">
        <div class="card-header">
            <div class="card-header-left"><div class="category-icon">🏢</div><div class="category-meta"><span class="category-title">위메이드 뉴스</span><span class="category-tags">위메이드, 위믹스, WEMIX</span></div></div>
            <div class="update-time">업데이트 <span class="u-ts">--:--</span></div>
        </div>
        <div id="n-wemade" class="news-list"><div class="loading">데이터 로딩 중...</div></div>
    </section>

    <section class="card">
        <div class="card-header">
            <div class="card-header-left"><div class="category-icon">🔗</div><div class="category-meta"><span class="category-title">블록체인 / Web3</span><span class="category-tags">업계 동향, 가상자산, NFT</span></div></div>
            <div class="update-time">업데이트 <span class="u-ts">--:--</span></div>
        </div>
        <div id="n-web3" class="news-list"><div class="loading">데이터 로딩 중...</div></div>
    </section>

    <section class="card">
        <div class="card-header">
            <div class="card-header-left"><div class="category-icon">📢</div><div class="category-meta"><span class="category-title">브랜딩 / 마케팅</span><span class="category-tags">트렌드, 캠페인, 인사이트</span></div></div>
            <div class="update-time">업데이트 <span class="u-ts">--:--</span></div>
        </div>
        <div id="n-brand" class="news-list"><div class="loading">데이터 로딩 중...</div></div>
    </section>

    <section class="card">
        <div class="card-header">
            <div class="card-header-left"><div class="category-icon">🔥</div><div class="category-meta"><span class="category-title">실시간 급상승 검색어</span><span class="category-tags">구글 대한민국 트렌드</span></div></div>
            <div class="update-time">업데이트 <span class="u-ts">--:--</span></div>
        </div>
        <div id="t-trends" class="trend-grid"><div class="loading" style="grid-column: span 2;">트렌드 분석 중...</div></div>
    </section>
</main>

<script>
    // 여러 개의 프록시 서버를 대안으로 설정 (안정성 강화)
    const PROXIES = [
        "https://api.allorigins.win/get?url=",
        "https://api.codetabs.com/v1/proxy?quest="
    ];

    async function fetchWithRetry(url) {
        // 첫 번째 프록시 시도, 실패 시 두 번째 프록시 사용
        for (let proxy of PROXIES) {
            try {
                const response = await fetch(proxy + encodeURIComponent(url));
                if (!response.ok) throw new Error();
                const data = await response.json();
                // allorigins는 .contents에 데이터가 담겨있고, codetabs는 바로 데이터임
                return data.contents || data;
            } catch (e) {
                continue; // 다음 프록시로 시도
            }
        }
        throw new Error("모든 프록시 연결 실패");
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('current-time').textContent = now.toLocaleTimeString('ko-KR', {hour12:false});
        const ts = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.querySelectorAll('.u-ts').forEach(el => el.textContent = ts);
    }
    setInterval(updateTime, 1000); updateTime();

    async function loadNews(query, targetId) {
        const container = document.getElementById(targetId);
        try {
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ko&gl=KR&ceid=KR:ko`;
            const xmlText = await fetchWithRetry(rssUrl);
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 7);

            if (items.length === 0) throw new Error();

            container.innerHTML = items.map(item => {
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                const source = item.querySelector("source") ? item.querySelector("source").textContent : "뉴스";
                return `
                    <a href="${link}" target="_blank" class="list-item">
                        <div class="item-title">${title.split(' - ')[0]}</div>
                        <div class="item-meta">${source}</div>
                    </a>
                `;
            }).join('');
        } catch (e) {
            container.innerHTML = `<div class="error">데이터를 가져오는데 실패했습니다.<br>잠시 후 다시 시도해 주세요.</div>`;
        }
    }

    async function loadTrends() {
        const container = document.getElementById('t-trends');
        try {
            const url = "https://trends.google.co.kr/trending/rss?geo=KR";
            const xmlText = await fetchWithRetry(url);
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);

            container.innerHTML = items.map((item, i) => {
                const kw = item.querySelector("title").textContent;
                return `
                    <a href="https://www.google.com/search?q=${encodeURIComponent(kw)}" target="_blank" class="trend-list-item">
                        <span class="rank">${i+1}</span>
                        <span>${kw}</span>
                    </a>
                `;
            }).join('');
        } catch (e) {
            container.innerHTML = `<div class="error" style="grid-column: span 2;">트렌드 로딩 실패</div>`;
        }
    }

    function refreshAll() {
        loadNews("위메이드 OR 위믹스 OR " + encodeURIComponent("WEMIX"), "n-wemade");
        loadNews("블록체인 마케팅 OR " + encodeURIComponent("Web3 트렌드") + " OR NFT 동향", "n-web3");
        loadNews("마케팅 캠페인 OR 브랜딩 사례 OR 광고 트렌드", "n-brand");
        loadTrends();
    }

    refreshAll();
    setInterval(refreshAll, 600000); // 10분마다 갱신
</script>
</body>
</html>
