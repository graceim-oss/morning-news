<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위메이드 모닝 클리핑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1128; --navy-light: #121b3d; --toss-blue: #3182f6;
            --text: #ffffff; --muted: #94a3b8; --border: rgba(255,255,255,0.1);
            --up: #ef4444; --down: #3b82f6; --card: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--navy); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        header { padding: 15px 25px; background: var(--navy); border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 18px; font-weight: 700; color: var(--toss-blue); }
        .price-bar { background: var(--navy-light); padding: 12px 25px; display: flex; gap: 30px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .price-item { display: flex; flex-direction: column; min-width: 130px; }
        .price-item .label { font-size: 11px; color: var(--muted); }
        .price-item .val { font-size: 15px; font-weight: 700; }
        main { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; min-height: 400px; }
        .panel-title { font-size: 17px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .news-item { text-decoration: none; color: inherit; display: block; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-item h4 { font-size: 14px; margin-bottom: 4px; color: #e2e8f0; }
        .news-meta { font-size: 11px; color: var(--muted); }
        .trend-group { margin-bottom: 20px; }
        .trend-group h3 { font-size: 13px; color: var(--toss-blue); margin-bottom: 10px; }
        .trend-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 6px; text-decoration: none; color: inherit; font-size: 13px; margin-bottom: 5px; }
        .trend-item .rank { font-weight: 700; color: var(--toss-blue); width: 18px; text-align: center; }
        .up { color: var(--up); } .down { color: var(--down); }
        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo">WEMADE <span style="color:white">Morning</span></div>
    <div id="current-time" style="font-size: 14px; font-weight: 500;"></div>
</header>

<div class="price-bar">
    <div class="price-item"><span class="label">위메이드</span><span class="val" id="p-wemade">로드 중..</span></div>
    <div class="price-item"><span class="label">위메이드맥스</span><span class="val" id="p-max">로드 중..</span></div>
    <div class="price-item"><span class="label">WEMIX (KRW)</span><span class="val" id="p-wemix">로드 중..</span></div>
</div>

<main>
    <section class="panel">
        <div class="panel-title">주요 뉴스 📰</div>
        <div id="news-list">데이터를 가져오는 중입니다...</div>
    </section>

    <aside class="panel">
        <div class="panel-title">실시간 트렌드 🔥</div>
        <div class="trend-group">
            <h3>🔍 구글 급상승</h3>
            <div id="g-trends">로딩 중..</div>
        </div>
        <div class="trend-group">
            <h3>📖 나무위키 검색어</h3>
            <div id="n-trends">로딩 중..</div>
        </div>
    </aside>
</main>

<script>
    // RSS/CORS 우회를 위한 프록시 (allorigins가 느릴 경우를 대비해 예외처리)
    const PROXY = "https://api.allorigins.win/get?url=";

    function getTime() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleString('ko-KR', {hour12:false});
    }
    setInterval(getTime, 1000);
    getTime();

    // 1. 주가 (네이버 금융 모바일 API 우회)
    async function fetchStocks() {
        const stocks = {'112040':'p-wemade', '233180':'p-max'};
        for (const [code, id] of Object.entries(stocks)) {
            try {
                const res = await fetch(`${PROXY}${encodeURIComponent(`https://m.stock.naver.com/api/stock/${code}/basic`)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                const color = data.compareToPreviousPrice.code === "2" ? 'up' : 'down';
                document.getElementById(id).innerHTML = `${data.closePrice} <span class="${color}" style="font-size:11px">${data.fluctuationsRatio}%</span>`;
            } catch (e) { document.getElementById(id).innerText = "연결 실패"; }
        }
        // 위믹스
        try {
            const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=wemix-token&vs_currencies=krw&include_24hr_change=true");
            const data = await res.json();
            const token = data['wemix-token'];
            document.getElementById('p-wemix').innerHTML = `${token.krw.toLocaleString()} <span class="${token.krw_24h_change>=0?'up':'down'}" style="font-size:11px">${token.krw_24h_change.toFixed(2)}%</span>`;
        } catch (e) { document.getElementById('p-wemix').innerText = "오류"; }
    }

    // 2. 뉴스 (Google News RSS)
    async function fetchNews() {
        const q = encodeURIComponent("위메이드 | 위믹스 | 블록체인");
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent(`https://news.google.com/rss/search?q=${q}&hl=ko&gl=KR&ceid=KR:ko`)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
            
            document.getElementById('news-list').innerHTML = items.map(item => `
                <a href="${item.querySelector("link").textContent}" target="_blank" class="news-item">
                    <h4>${item.querySelector("title").textContent}</h4>
                    <div class="news-meta">${item.querySelector("source").textContent} · ${new Date(item.querySelector("pubDate").textContent).toLocaleTimeString()}</div>
                </a>
            `).join('');
        } catch (e) { document.getElementById('news-list').innerText = "뉴스 로드 실패"; }
    }

    // 3. 트렌드 (구글 & 나무위키)
    async function fetchTrends() {
        // 구글
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent("https://trends.google.co.kr/trending/rss?geo=KR")}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
            document.getElementById('g-trends').innerHTML = items.map((item, i) => `
                <a href="https://www.google.com/search?q=${encodeURIComponent(item.querySelector("title").textContent)}" target="_blank" class="trend-item">
                    <span class="rank">${i+1}</span> ${item.querySelector("title").textContent}
                </a>
            `).join('');
        } catch (e) {}

        // 나무위키 (구조가 유동적이라 실시간 랭킹 API 시도)
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent("https://search.namu.wiki/api/ranking")}`);
            const data = await res.json();
            const items = JSON.parse(data.contents);
            document.getElementById('n-trends').innerHTML = items.slice(0, 10).map((kw, i) => `
                <a href="https://namu.wiki/w/${encodeURIComponent(kw)}" target="_blank" class="trend-item">
                    <span class="rank">${i+1}</span> ${kw}
                </a>
            `).join('');
        } catch (e) { document.getElementById('n-trends').innerText = "데이터 없음"; }
    }

    fetchStocks(); fetchNews(); fetchTrends();
</script>
</body>
</html>
