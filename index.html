<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>위메이드 브랜드마케팅팀 인사이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ─── 디자인 토큰 ─────────────────────────────────────── */
    :root {
      --bg: #f4f6fb; --bg2: #ffffff; --bg3: #f0f2f8;
      --line: rgba(0,0,0,0.07); --line2: rgba(0,0,0,0.12);
      --txt: #1a1f36; --txt2: #5a6282; --txt3: #9ea6c0;
      --accent: #4f5bd5; --accent-lt: rgba(79,91,213,0.1);
      --up: #e03131; --down: #1971c2; --green: #0ca678; --amber: #e67700;
      --font: 'Pretendard', sans-serif; --mono: 'DM Mono', monospace; --r: 12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;min-height:100vh;}

    /* ─── 컴포넌트 ─────────────────────────────────────── */
    header{background:var(--bg2); border-bottom:1px solid var(--line); height:60px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:300;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-mark{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;}
    .logo-text{font-size:15px;font-weight:700;}
    .hd-right{display:flex;align-items:center;gap:10px;}
    #hd-clock{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:1px;}
    
    .ticker{background:var(--bg2); border-bottom:1px solid var(--line); height:48px; display:flex; align-items:center; padding:0 28px; overflow-x:auto; position:sticky; top:60px; z-index:200;}
    .tk-item{display:flex;align-items:center;gap:10px;padding:0 18px;height:100%;border-right:1px solid var(--line);text-decoration:none;flex-shrink:0;}
    .tk-price{font-family:var(--mono);font-size:14px;font-weight:500;}
    .up{color:var(--up);} .dn{color:var(--down);}

    .wrapper{max-width:1520px;margin:0 auto;padding:20px 28px 48px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
    .section-label{font-size:10px;font-weight:700;color:var(--txt3);margin:24px 0 10px;letter-spacing:1px;}

    .card{background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; display:flex; flex-direction:column;}
    .card-hd{padding:12px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
    .card-ttl h2{font-size:13px; font-weight:700;}
    
    .news-body{overflow-y:auto; max-height:350px; min-height:150px;}
    .ni{padding:12px 16px; border-bottom:1px solid var(--line); transition: .15s;}
    .ni:hover{background:var(--bg3);}
    .ni a{font-size:12.5px; font-weight:500; color:var(--txt); text-decoration:none; line-height:1.5; display:block;}
    .ni-meta{margin-top:4px; font-size:10px; color:var(--txt3); display:flex; gap:8px;}

    .btn{background:var(--bg3); border:1px solid var(--line2); padding:5px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600;}
    .spinning{display:inline-block; animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .sbox{padding:40px; text-align:center; color:var(--txt2); font-size:12px;}
    .ldr{width:20px; height:20px; border:2px solid #ddd; border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin: 0 auto 10px;}
    
    @media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr;}}
    @media(max-width:720px){.grid-3,.grid-2{grid-template-columns:1fr;} .wrapper{padding:16px;}}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">W</div>
    <span class="logo-text">브랜드마케팅팀 인사이트</span>
  </div>
  <div class="hd-right">
    <span id="hd-clock">00:00:00</span>
    <button class="btn" onclick="refreshAll(true)">
      <span id="spin">↻</span> 새로고침
    </button>
  </div>
</header>

<div class="ticker" id="ticker-box">
  <div class="sbox" style="padding:10px"><div class="ldr"></div></div>
</div>

<div class="wrapper">
  <div class="section-label">📰 실시간 뉴스 클리핑</div>
  <div class="grid-3">
    <div class="card">
      <div class="card-hd"><div class="card-ttl"><h2>위메이드 / 위믹스</h2></div><div id="upd-wemade" style="font-size:9px;color:#999"></div></div>
      <div class="news-body" id="body-wemade"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-ttl"><h2>블록체인 / Web3</h2></div><div id="upd-blockchain" style="font-size:9px;color:#999"></div></div>
      <div class="news-body" id="body-blockchain"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-ttl"><h2>마케팅 트렌드</h2></div><div id="upd-marketing" style="font-size:9px;color:#999"></div></div>
      <div class="news-body" id="body-marketing"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
  </div>

  <div class="section-label">🔥 트렌드 데이터</div>
  <div class="grid-2">
    <div class="card">
      <div class="card-hd"><h2>구글 검색 트렌드 (KR)</h2><div id="upd-gtrend" style="font-size:9px;color:#999"></div></div>
      <div id="body-gtrend"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
    <div class="card">
      <div class="card-hd"><h2>나무위키 인기검색어</h2><div id="upd-namu" style="font-size:9px;color:#999"></div></div>
      <div id="body-namu"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
  </div>
</div>

<script>
/* ─── 설정 ─── */
const QUERIES = {
  wemade: '위메이드 OR 위믹스 OR "WEMIX"',
  blockchain: '블록체인 Web3 OR 가상자산 비트코인',
  marketing: '마케팅 트렌드 OR 브랜드 캠페인 사례'
};

const $ = id => document.getElementById(id);
const nowKST = () => new Date().toLocaleTimeString('ko-KR', {hour12:false});

/* ─── 강력한 프록시 함수 (2중 시도) ─── */
async function fetchSafe(url) {
  // 1차 시도: AllOrigins
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`);
    if (res.ok) {
      const data = await res.json();
      if (data.contents) return data.contents;
    }
  } catch (e) { console.warn("Primary proxy failed, trying secondary..."); }

  // 2차 시도: Codetabs (폴백)
  try {
    const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
    if (res.ok) return await res.text();
  } catch (e) { throw new Error("모든 프록시 서버가 응답하지 않습니다."); }
}

/* ─── 뉴스 로드 ─── */
async function loadNews(cat) {
  const body = $(`body-${cat}`);
  try {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(QUERIES[cat])}&hl=ko&gl=KR&ceid=KR:ko`;
    const xmlText = await fetchSafe(rssUrl);
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
    
    body.innerHTML = items.map(item => `
      <div class="ni">
        <a href="${item.querySelector("link").textContent}" target="_blank">${item.querySelector("title").textContent}</a>
        <div class="ni-meta">
          <span>${item.querySelector("source")?.textContent || '뉴스'}</span>
          <span>${new Date(item.querySelector("pubDate").textContent).toLocaleDateString()}</span>
        </div>
      </div>
    `).join('');
    $(`upd-${cat}`).textContent = nowKST();
  } catch (e) {
    body.innerHTML = `<div class="sbox">데이터 로드 실패<br><small>${e.message}</small></div>`;
  }
}

/* ─── 주가 로드 ─── */
async function loadStocks() {
  const box = $('ticker-box');
  try {
    const data = await fetchSafe(`https://polling.finance.naver.com/api/realtime/site/stock/get?stockCodes=112040,233180`);
    const json = JSON.parse(data);
    const stocks = json.result.areas[0].datas;
    
    box.innerHTML = stocks.map(s => {
      const cls = s.cv > 0 ? 'up' : (s.cv < 0 ? 'dn' : '');
      return `
        <div class="tk-item">
          <span style="font-size:11px; font-weight:700;">${s.nm}</span>
          <span class="tk-price ${cls}">₩${s.nv.toLocaleString()}</span>
          <span style="font-size:10px;" class="${cls}">${s.cv > 0 ? '▲' : '▼'} ${s.cr}%</span>
        </div>
      `;
    }).join('') + `<div style="margin-left:auto; font-size:10px; color:#999;">${nowKST()}</div>`;
  } catch (e) { box.innerHTML = `<div style="padding:10px; font-size:11px; color:red;">주가 로드 실패</div>`; }
}

/* ─── 기타 트렌드 ─── */
async function loadTrends() {
  try {
    const xmlText = await fetchSafe('https://trends.google.com/trending/rss?geo=KR');
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const items = Array.from(xml.querySelectorAll("item")).slice(0, 15);
    $('body-gtrend').innerHTML = '<div style="padding:15px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">' + 
      items.map((it, i) => `<div style="font-size:12px;"><b>${i+1}.</b> ${it.querySelector("title").textContent}</div>`).join('') + '</div>';
    $('upd-gtrend').textContent = nowKST();
  } catch (e) { $('body-gtrend').innerHTML = '<div class="sbox">로드 실패</div>'; }
}

async function loadNamu() {
  try {
    const data = await fetchSafe('https://search.namu.wiki/api/ranking');
    const list = JSON.parse(data);
    $('body-namu').innerHTML = '<div style="padding:15px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">' + 
      list.slice(0, 14).map((it, i) => `<div style="font-size:12px;"><b>${i+1}.</b> ${it.keyword || it}</div>`).join('') + '</div>';
    $('upd-namu').textContent = nowKST();
  } catch (e) { $('body-namu').innerHTML = '<div class="sbox">데이터 제한됨</div>'; }
}

/* ─── 실행 ─── */
async function refreshAll(isManual = false) {
  if(isManual) $('spin').classList.add('spinning');
  await Promise.all([loadStocks(), loadNews('wemade'), loadNews('blockchain'), loadNews('marketing'), loadTrends(), loadNamu()]);
  if(isManual) $('spin').classList.remove('spinning');
}

setInterval(() => { const now = new Date(); $('hd-clock').textContent = now.toLocaleTimeString('ko-KR', {hour12:false}); }, 1000);
refreshAll();
setInterval(refreshAll, 1000 * 60 * 15); // 15분마다 갱신
</script>
</body>
</html>
