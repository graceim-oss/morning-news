<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위메이드 브랜드마케팅 뉴스클리핑</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f1f3f6;
            --bg-card: #ffffff;
            --bg-header: #101c40;
            --primary: #3182f6;
            --text-dark: #222222;
            --text-gray: #7d7d7d;
            --border: #e6e6e6;
            --shadow: 0 6px 16px rgba(0,0,0,0.06);
            --font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-body); color: var(--text-dark); -webkit-font-smoothing: antialiased; }

        /* --- Header --- */
        header { 
            background-color: var(--bg-header); 
            color: white; 
            padding: 18px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left h1 { font-size: 19px; font-weight: 700; }
        .header-left span { font-weight: 400; color: #a1b0d6; font-size: 17px; }
        .status-badge { 
            background-color: rgba(255,255,255,0.08); 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 500; 
            color: #d1d5db; 
            display: flex; align-items: center; gap: 4px; 
        }
        .status-badge::before { content: ""; display: block; width: 6px; height: 6px; background-color: #2fb138; border-radius: 50%; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .header-right .time-info { text-align: right; }
        .header-right .current-date { font-size: 12px; color: #a1b0d6; }
        .header-right .current-time { font-size: 20px; font-weight: 700; }
        .btn-refresh { 
            background-color: rgba(255,255,255,0.08); 
            color: white; border: none; 
            padding: 10px 15px; border-radius: 8px; 
            font-size: 13px; font-weight: 500; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; 
            transition: 0.2s;
        }
        .btn-refresh:hover { background-color: rgba(255,255,255,0.15); }

        /* --- Main Content --- */
        main { 
            max-width: 1600px; margin: 30px auto; 
            padding: 0 40px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
        }

        /* --- Card Style --- */
        .card { 
            background-color: var(--bg-card); 
            border-radius: 16px; 
            padding: 25px; 
            box-shadow: var(--shadow); 
            border: 1px solid #e1e3e7;
            display: flex; flex-direction: column; 
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card-header { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding-bottom: 20px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 15px;
        }
        .card-header-left { display: flex; align-items: center; gap: 15px; }
        .category-icon { font-size: 24px; padding: 10px; background-color: #f6f8fb; border-radius: 10px; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; }
        .category-meta { display: flex; flex-direction: column; gap: 1px; }
        .category-title { font-size: 16px; font-weight: 700; color: var(--text-dark); }
        .category-tags { font-size: 12px; color: var(--text-gray); }
        .card-header-right { text-align: right; }
        .update-time { font-size: 11px; color: #a0a8b9; font-weight: 500; margin-bottom: 5px; }
        .source-tag { font-size: 11px; color: #a1b0d6; background-color: #f1f3f6; padding: 3px 8px; border-radius: 4px; font-weight: 700; color: #101c40; }

        .news-list, .trend-list { display: flex; flex-direction: column; flex-grow: 1; }
        .list-item { 
            text-decoration: none; color: inherit; display: block; 
            padding: 12px 0; border-bottom: 1px solid #f6f8fb; 
            transition: color 0.1s; 
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover .item-title { color: var(--primary); }
        .item-title { font-size: 14px; font-weight: 500; color: #333333; margin-bottom: 3px; line-height: 1.4; }
        .item-meta { font-size: 11px; color: var(--text-gray); display: flex; align-items: center; gap: 8px; }

        /* --- Trend Specific --- */
        .trend-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 20px; }
        .trend-list-item { 
            text-decoration: none; color: inherit; 
            padding: 10px; background-color: #f6f8fb; 
            border-radius: 8px; font-size: 13px; font-weight: 500; 
            display: flex; align-items: center; gap: 10px; 
            transition: 0.2s;
        }
        .trend-list-item:hover { background-color: #ebeff5; }
        .rank { color: var(--primary); font-weight: 700; width: 20px; text-align: center; }

        /* --- Responsive --- */
        @media (max-width: 1024px) { main { grid-template-columns: 1fr; } header { padding: 18px 25px; } main { padding: 0 20px; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>위메이드 <span>브랜드마케팅 뉴스클리핑</span></h1>
        <div class="status-badge" title="데이터 연결 상태 양호">정상 작동</div>
    </div>
    <div class="header-right">
        <div class="time-info">
            <div class="current-date" id="current-date">--년 --월 --일 --요일</div>
            <div class="current-time" id="current-time">--:--:--</div>
        </div>
        <button class="btn-refresh" id="btn-refresh">↻ 새로고침</button>
    </div>
</header>

<main>
    <section class="card">
        <div class="card-header">
            <div class="card-header-left">
                <div class="category-icon">📰</div>
                <div class="category-meta">
                    <span class="category-title">위메이드 뉴스</span>
                    <span class="category-tags">위메이드, 위믹스, WEMADE</span>
                </div>
            </div>
            <div class="card-header-right">
                <div class="update-time">업데이트 <span class="u-time">--:--</span></div>
                <span class="source-tag">출처: 구글</span>
            </div>
        </div>
        <div class="news-list" id="n-wemade"></div>
    </section>

    <section class="card">
        <div class="card-header">
            <div class="card-header-left">
                <div class="category-icon">🔗</div>
                <div class="category-meta">
                    <span class="category-title">블록체인 / Web3</span>
                    <span class="category-tags">업계 동향, 가상자산, NFT, 마케팅</span>
                </div>
            </div>
            <div class="card-header-right">
                <div class="update-time">업데이트 <span class="u-time">--:--</span></div>
                <span class="source-tag">출처: 구글</span>
            </div>
        </div>
        <div class="news-list" id="n-web3"></div>
    </section>

    <section class="card">
        <div class="card-header">
            <div class="card-header-left">
                <div class="category-icon">📣</div>
                <div class="category-meta">
                    <span class="category-title">브랜딩 / 마케팅</span>
                    <span class="category-tags">트렌드, 캠페인, 광고, 인사이트</span>
                </div>
            </div>
            <div class="card-header-right">
                <div class="update-time">업데이트 <span class="u-time">--:--</span></div>
                <span class="source-tag">출처: 구글</span>
            </div>
        </div>
        <div class="news-list" id="n-brand"></div>
    </section>

    <section class="card">
        <div class="card-header">
            <div class="card-header-left">
                <div class="category-icon">🔥</div>
                <div class="category-meta">
                    <span class="category-title">실시간 급상승 검색어</span>
                    <span class="category-tags">지금 사람들이 관심 갖는 키워드</span>
                </div>
            </div>
            <div class="card-header-right">
                <div class="update-time">업데이트 <span class="u-time">--:--</span></div>
                <span class="source-tag">출처: 구글</span>
            </div>
        </div>
        <div class="trend-grid" id="t-trends"></div>
    </section>
</main>

<script>
    const PROXY = "https://api.allorigins.win/get?url=";
    const NEWS_KEYS = {
        'wemade': encodeURIComponent('위메이드 OR 장현국 OR 위믹스 OR WEMIX'),
        'web3': encodeURIComponent('블록체인 마케팅 OR web3 프로젝트 OR 가상자산 동향'),
        'brand': encodeURIComponent('브랜딩 성공 사례 OR 캠페인 OR 국내 마케팅 트렌드')
    };

    // 시계 및 업데이트 타임 표시
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear(); const m = (now.getMonth()+1).toString().padStart(2,'0'); const d = now.getDate().toString().padStart(2,'0'); const w = ['일','월','화','수','목','금','토'][now.getDay()];
        const h = now.getHours().toString().padStart(2,'0'); const min = now.getMinutes().toString().padStart(2,'0'); const s = now.getSeconds().toString().padStart(2,'0');
        document.getElementById('current-date').textContent = `${y}년 ${m}월 ${d}일 ${w}요일`;
        document.getElementById('current-time').textContent = `${h}:${min}:${s}`;
        
        // 카드 업데이트 시간 표시
        const utime = `${m}/${d} ${h}:${min}`;
        document.querySelectorAll('.u-time').forEach(el => el.textContent = utime);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 뉴스 가져오기
    async function fetchNews(type, targetId) {
        document.getElementById(targetId).innerHTML = "<div style='font-size:12px; color:gray; padding:20px 0;'>로딩 중...</div>";
        const url = `https://news.google.com/rss/search?q=${NEWS_KEYS[type]}&hl=ko&gl=KR&ceid=KR:ko`;
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent(url)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 7);
            
            if (items.length === 0) { throw new Error("no news"); }

            document.getElementById(targetId).innerHTML = items.map(item => {
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                const source = item.querySelector("source").textContent;
                const pubDate = new Date(item.querySelector("pubDate").textContent).toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'});
                return `
                    <a href="${link}" target="_blank" class="list-item">
                        <div class="item-title">${title}</div>
                        <div class="item-meta">${source} · ${pubDate}</div>
                    </a>
                `;
            }).join('');
        } catch (e) {
            document.getElementById(targetId).innerHTML = "<div style='font-size:12px; color:#ef4444; padding:20px 0;'>오류: 데이터를 가져오지 못했습니다.</div>";
        }
    }

    // 트렌드 (급상승 검색어) 가져오기
    async function fetchTrends() {
        document.getElementById('t-trends').innerHTML = "<div style='grid-column: span 2; font-size:12px; color:gray; padding:20px 0;'>로딩 중...</div>";
        const url = "https://trends.google.co.kr/trending/rss?geo=KR";
        try {
            const res = await fetch(`${PROXY}${encodeURIComponent(url)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);

            document.getElementById('t-trends').innerHTML = items.map((item, i) => {
                const kw = item.querySelector("title").textContent;
                return `
                    <a href="https://www.google.com/search?q=${encodeURIComponent(kw)}" target="_blank" class="trend-list-item">
                        <span class="rank">${i+1}</span> ${kw}
                    </a>
                `;
            }).join('');
        } catch (e) {
            document.getElementById('t-trends').innerHTML = "<div style='grid-column: span 2; font-size:12px; color:#ef4444; padding:20px 0;'>오류: 데이터를 가져오지 못했습니다.</div>";
        }
    }

    function refreshAll() {
        fetchNews('wemade', 'n-wemade');
        fetchNews('web3', 'n-web3');
        fetchNews('brand', 'n-brand');
        fetchTrends();
        updateClock();
    }

    // 초반 로딩
    refreshAll();

    // 5분마다 전체 갱신
    setInterval(refreshAll, 300000);

    // 새로고침 버튼 작동
    document.getElementById('btn-refresh').addEventListener('click', refreshAll);
</script>
</body>
</html>
