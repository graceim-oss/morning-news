<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>위메이드 브랜드마케팅팀 인사이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ─── 원본 토큰 및 디자인 복구 ────────────────────────── */
    :root {
      --bg: #f4f6fb; --bg2: #ffffff; --bg3: #f0f2f8;
      --line: rgba(0,0,0,0.07); --line2: rgba(0,0,0,0.12);
      --txt: #1a1f36; --txt2: #5a6282; --txt3: #9ea6c0;
      --accent: #4f5bd5; --accent-lt: rgba(79,91,213,0.1);
      --up: #e03131; --down: #1971c2; --green: #0ca678; --amber: #e67700;
      --font: 'Pretendard', sans-serif; --mono: 'DM Mono', monospace; --r: 12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;min-height:100vh;}

    /* 헤더 */
    header{background:var(--bg2); border-bottom:1px solid var(--line); height:60px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:300;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-mark{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;}
    .logo-text{font-size:15px;font-weight:700;}
    .hd-right{display:flex;align-items:center;gap:10px;}
    #hd-clock{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:1px;}

    /* 주가 티커 */
    .ticker{background:var(--bg2); border-bottom:1px solid var(--line); height:48px; display:flex; align-items:center; padding:0 28px; overflow-x:auto; position:sticky; top:60px; z-index:200;}
    .tk-item{display:flex;align-items:center;gap:10px;padding:0 18px;height:100%;border-right:1px solid var(--line);text-decoration:none;flex-shrink:0;}
    .tk-name{font-size:10px;font-weight:700;color:var(--txt2);}
    .tk-price{font-family:var(--mono);font-size:14px;font-weight:500;}
    .up{color:var(--up);} .dn{color:var(--down);}

    /* 그리드 레이아웃 */
    .wrapper{max-width:1520px;margin:0 auto;padding:20px 28px 48px;}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--txt3);text-transform:uppercase;margin:24px 0 10px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

    /* 카드 스타일 */
    .card{background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; display:flex; flex-direction:column;}
    .card-hd{padding:12px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
    .card-ttl{display:flex;align-items:center;gap:9px;}
    .card-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
    .ic-w{background:rgba(79,91,213,0.15);} .ic-b{background:rgba(25,113,194,0.1);} .ic-m{background:rgba(230,119,0,0.1);}
    .card-ttl h2{font-size:13px; font-weight:700;}
    .card-upd{font-family:var(--mono); font-size:10px; color:var(--txt3);}

    /* 뉴스 목록 */
    .news-body{overflow-y:auto; max-height:320px; min-height:150px;}
    .ni{padding:12px 16px; border-bottom:1px solid var(--line); transition:background .12s;}
    .ni:hover{background:var(--bg3);}
    .ni a{font-size:12.5px; font-weight:500; color:var(--txt); text-decoration:none; line-height:1.5; display:block;}
    .ni-meta{margin-top:4px; display:flex; align-items:center; gap:8px; font-size:10px; color:var(--txt3);}
    .ni-src{font-weight:600; color:var(--txt2);}

    /* 로딩/버튼 */
    .btn{background:var(--bg3); border:1px solid var(--line2); padding:5px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600;}
    .spinning{display:inline-block; animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .sbox{padding:40px; text-align:center; color:var(--txt2); font-size:12px;}
    .ldr{width:20px; height:20px; border:2px solid #ddd; border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px;}

    @media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr;}}
    @media(max-width:720px){.grid-3{grid-template-columns:1fr;} .wrapper{padding:16px;}}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">W</div>
    <span class="logo-text">브랜드마케팅팀 인사이트</span>
  </div>
  <div class="hd-right">
    <span id="hd-clock">00:00:00</span>
    <button class="btn" id="btn-ref" onclick="refreshAll(true)">
      <span id="spin">↻</span> 새로고침
    </button>
  </div>
</header>

<div class="ticker" id="ticker-area">
  <div style="padding:0 20px; font-size:12px; color:#999;">데이터 연결 중...</div>
</div>

<div class="wrapper">
  <div class="section-label">📰 오늘의 뉴스 클리핑</div>
  <div class="grid-3">
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl"><div class="card-ico ic-w">🏢</div><div><h2>위메이드 / 위믹스</h2></div></div>
        <div class="card-upd" id="upd-wemade">—</div>
      </div>
      <div class="news-body" id="body-wemade"><div class="sbox"><div class="ldr"></div><span>불러오는 중...</span></div></div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl"><div class="card-ico ic-b">⛓️</div><div><h2>블록체인 / Web3</h2></div></div>
        <div class="card-upd" id="upd-blockchain">—</div>
      </div>
      <div class="news-body" id="body-blockchain"><div class="sbox"><div class="ldr"></div><span>불러오는 중...</span></div></div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl"><div class="card-ico ic-m">📣</div><div><h2>마케팅 / 트렌드</h2></div></div>
        <div class="card-upd" id="upd-marketing">—</div>
      </div>
      <div class="news-body" id="body-marketing"><div class="sbox"><div class="ldr"></div><span>불러오는 중...</span></div></div>
    </div>
  </div>
</div>

<script>
/* ─── 설정 ─── */
const QUERIES = {
  wemade: '위메이드 OR 위믹스 OR "WEMIX"',
  blockchain: '블록체인 Web3 OR NFT 가상자산',
  marketing: '마케팅 트렌드 OR 디지털 브랜드 캠페인'
};

const $ = id => document.getElementById(id);
const nowKST = () => new Date().toLocaleTimeString('ko-KR', {hour12:false});

/* ─── 안정적인 프록시 데이터 패치 ─── */
async function fetchSafe(url) {
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`;
  try {
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error();
    const data = await res.json();
    return data.contents;
  } catch (e) {
    // 폴백 프록시
    const fallback = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
    return await fallback.text();
  }
}

/* ─── 뉴스 로드 (원본 스타일 유지) ─── */
async function loadNews(cat) {
  const body = $(`body-${cat}`);
  const upd = $(`upd-${cat}`);
  try {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(QUERIES[cat])}&hl=ko&gl=KR&ceid=KR:ko`;
    const xmlText = await fetchSafe(rssUrl);
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const items = Array.from(xml.querySelectorAll("item")).slice(0, 12);
    
    body.innerHTML = items.map(it => {
      const title = it.querySelector("title").textContent;
      const link = it.querySelector("link").textContent;
      const source = it.querySelector("source")?.textContent || "뉴스";
      const date = new Date(it.querySelector("pubDate").textContent).toLocaleDateString('ko-KR', {month:'short', day:'numeric'});
      return `
        <div class="ni">
          <a href="${link}" target="_blank">${title}</a>
          <div class="ni-meta">
            <span class="ni-src">${source}</span>
            <span class="ni-time">${date}</span>
          </div>
        </div>
      `;
    }).join('');
    if(upd) upd.textContent = nowKST();
  } catch (e) {
    body.innerHTML = `<div class="sbox">뉴스 로드 실패</div>`;
  }
}

/* ─── 주가 정보 로드 ─── */
async function loadStocks() {
  const area = $('ticker-area');
  try {
    const data = await fetchSafe(`https://polling.finance.naver.com/api/realtime/site/stock/get?stockCodes=112040,233180`);
    const json = JSON.parse(data);
    const stocks = json.result.areas[0].datas;
    
    area.innerHTML = stocks.map(s => {
      const isUp = s.cv > 0;
      const isDn = s.cv < 0;
      const cls = isUp ? 'up' : (isDn ? 'dn' : '');
      return `
        <a class="tk-item" href="https://finance.naver.com/item/main.naver?code=${s.cd}" target="_blank">
          <span class="tk-name">${s.nm}</span>
          <span class="tk-price ${cls}">₩${s.nv.toLocaleString()}</span>
          <span style="font-size:10px;" class="${cls}">${isUp?'▲':isDn?'▼':''} ${s.cr}%</span>
        </a>
      `;
    }).join('') + `<span style="margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--txt3);">${nowKST()}</span>`;
  } catch (e) { area.innerHTML = '<div style="padding:0 20px; font-size:11px; color:red;">주가 연결 실패</div>'; }
}

/* ─── 공통 실행 ─── */
async function refreshAll(manual = false) {
  if(manual) $('spin').classList.add('spinning');
  await Promise.all([loadStocks(), loadNews('wemade'), loadNews('blockchain'), loadNews('marketing')]);
  if(manual) $('spin').classList.remove('spinning');
}

// 시계 가동
setInterval(() => { $('hd-clock').textContent = nowKST(); }, 1000);

// 초기화
window.onload = () => refreshAll();

// 자동 갱신 (15분)
setInterval(refreshAll, 1000 * 60 * 15);
</script>

</body>
</html>
