<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>위메이드 브랜드마케팅팀 인사이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ─── 토큰 ─────────────────────────────────────── */
    :root {
      --bg:        #f4f6fb;
      --bg2:       #ffffff;
      --bg3:       #f0f2f8;
      --line:      rgba(0,0,0,0.07);
      --line2:     rgba(0,0,0,0.12);
      --txt:       #1a1f36;
      --txt2:      #5a6282;
      --txt3:      #9ea6c0;
      --accent:    #4f5bd5;
      --accent-lt: rgba(79,91,213,0.1);
      --up:        #e03131;
      --down:      #1971c2;
      --green:     #0ca678;
      --amber:     #e67700;
      --font:      'Pretendard', 'Noto Sans KR', sans-serif;
      --mono:      'DM Mono', monospace;
      --r:          12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;min-height:100vh;}

    /* ─── 헤더 ─────────────────────────────────────── */
    header{
      background:var(--bg2);
      border-bottom:1px solid var(--line);
      height:60px;padding:0 28px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:300;
    }
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-mark{
      width:28px;height:28px;border-radius:8px;
      background:var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:800;color:#fff;letter-spacing:-0.5px;
    }
    .logo-text{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
    .logo-sub{font-size:11px;color:var(--txt2);margin-left:6px;font-weight:400;}
    .hd-right{display:flex;align-items:center;gap:10px;}
    #hd-date{font-size:12px;color:var(--txt2);}
    #hd-clock{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:1px;}
    .btn{
      display:flex;align-items:center;gap:5px;
      background:var(--bg3);border:1px solid var(--line2);
      color:var(--txt);padding:5px 13px;border-radius:8px;
      cursor:pointer;font-size:12px;font-family:var(--font);font-weight:600;
      transition:border-color .2s,color .2s;
    }
    .btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    #spin{display:inline-block;}
    .spinning{animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ─── 주가 띠 ───────────────────────────────────── */
    .ticker{
      background:var(--bg2);
      border-bottom:1px solid var(--line);
      height:48px;display:flex;align-items:center;
      padding:0 28px;overflow-x:auto;gap:0;
      position:sticky;top:60px;z-index:200;
    }
    .ticker::-webkit-scrollbar{display:none;}
    .tk-item{
      display:flex;align-items:center;gap:10px;
      padding:0 18px;height:100%;flex-shrink:0;
      border-right:1px solid var(--line);
      text-decoration:none;transition:background .15s;
    }
    .tk-item:hover{background:rgba(0,0,0,0.02);}
    .tk-item:last-of-type{border-right:none;}
    .tk-info{display:flex;flex-direction:column;gap:2px;}
    .tk-label{display:flex;align-items:center;gap:4px;}
    .tk-name{font-size:10px;font-weight:700;color:var(--txt2);}
    .tk-tag{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--bg3);color:var(--txt3);font-weight:700;}
    .tk-row{display:flex;align-items:baseline;gap:6px;}
    .tk-price{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--txt);}
    .tk-chg{font-size:10px;font-weight:600;}
    .tk-chg.up{color:var(--up);}
    .tk-chg.dn{color:var(--down);}
    .tk-chg.fl{color:var(--txt3);}
    .tk-pill{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;align-self:center;flex-shrink:0;}
    .pl-live{background:rgba(12,166,120,0.1);color:var(--green);}
    .pl-cls{background:rgba(0,0,0,0.05);color:var(--txt3);}
    .pl-err{background:rgba(224,49,49,0.1);color:var(--up);}
    .tk-upd{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--txt3);padding-left:18px;white-space:nowrap;flex-shrink:0;}

    /* ─── 레이아웃 ──────────────────────────────────── */
    .wrapper{max-width:1520px;margin:0 auto;padding:20px 28px 48px;}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--txt3);text-transform:uppercase;margin:24px 0 10px;}
    .section-label:first-child{margin-top:0;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

    /* ─── 카드 ──────────────────────────────────────── */
    .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;}
    .card-hd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .card-ttl{display:flex;align-items:center;gap:9px;}
    .card-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .ic-w{background:rgba(79,91,213,0.1);}
    .ic-b{background:rgba(25,113,194,0.1);}
    .ic-m{background:rgba(230,119,0,0.1);}
    .ic-g{background:rgba(224,49,49,0.1);}
    .ic-n{background:rgba(12,166,120,0.1);}
    .card-ttl h2{font-size:13px;font-weight:700;}
    .card-sub{font-size:10px;color:var(--txt2);margin-top:1px;}
    .card-meta{text-align:right;flex-shrink:0;}
    .card-upd{font-family:var(--mono);font-size:10px;color:var(--txt3);}
    .src-pills{display:flex;justify-content:flex-end;gap:3px;margin-top:3px;}
    .pll{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;}
    .pll-g{background:var(--accent-lt);color:var(--accent);}

    /* 뉴스 목록 */
    .news-body{overflow-y:auto;max-height:320px;min-height:200px;}
    .news-body::-webkit-scrollbar{width:3px;}
    .news-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px;}
    .ni{padding:12px 16px;border-bottom:1px solid var(--line);transition:background .12s;}
    .ni:hover{background:var(--bg3);}
    .ni:last-child{border-bottom:none;}
    .ni a{font-size:12.5px;font-weight:500;color:var(--txt);text-decoration:none;line-height:1.5;display:block;}
    .ni a:hover{color:var(--accent);}
    .ni-meta{margin-top:4px;display:flex;align-items:center;gap:5px;}
    .ni-src{font-size:10px;color:var(--txt2);font-weight:600;}
    .ni-time{font-size:10px;color:var(--txt3);}
    .ni-badge{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:var(--accent-lt);color:var(--accent);}

    /* 트렌드 그리드 */
    .trends-pane{overflow-y:auto;max-height:320px;}
    .trends-pane::-webkit-scrollbar{width:3px;}
    .trends-pane::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px;}
    .tg{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .tr-link{text-decoration:none;display:block;}
    .tr-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;background:var(--bg3);border:1px solid transparent;transition:all .15s;}
    .tr-link:hover .tr-item{border-color:var(--accent);background:white;}
    .tr-rank{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);min-width:16px;text-align:center;}
    .tr-rank.r1{color:var(--up);font-size:12px;}
    .tr-rank.r3{color:var(--amber);}
    .tr-kw{font-size:11.5px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
    .tr-vol{font-size:9px;color:var(--txt3);flex-shrink:0;font-family:var(--mono);}

    /* 탭 */
    .tab-bar{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
    .tab-btn{flex:1;padding:10px 0;font-size:11px;font-weight:700;font-family:var(--font);background:none;border:none;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;transition:all .15s;}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}

    /* 상태 표시 */
    .sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;gap:10px;color:var(--txt2);font-size:12px;}
    .ldr{width:22px;height:22px;border:2px solid rgba(0,0,0,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    .errbox{padding:30px;text-align:center;color:var(--up);font-size:11px;line-height:1.6;}

    footer{text-align:center;padding:16px;font-size:10px;color:var(--txt3);border-top:1px solid var(--line);font-family:var(--mono);margin-top:20px;}

    @media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr;}}
    @media(max-width:720px){
      .grid-3,.grid-2{grid-template-columns:1fr;}
      .wrapper{padding:16px;}
      header,.ticker{padding:0 16px;}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">W</div>
    <span class="logo-text">브랜드마케팅팀 인사이트</span>
    <span class="logo-sub" id="hd-date"></span>
  </div>
  <div class="hd-right">
    <span id="hd-clock"></span>
    <button class="btn" id="btn-ref" onclick="refreshAll(true)">
      <span id="spin">↻</span> 새로고침
    </button>
  </div>
</header>

<div class="ticker" id="ticker">
  <div style="display:flex;align-items:center;gap:8px;padding:0 16px;">
    <div class="ldr"></div>
    <span style="font-size:11px;color:var(--txt2);">데이터 동기화 중...</span>
  </div>
</div>

<div class="wrapper">
  <div class="section-label">📰 오늘의 뉴스 클리핑</div>
  <div class="grid-3">
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl">
          <div class="card-ico ic-w">🏢</div>
          <div><h2>위메이드</h2><div class="card-sub">위메이드 · 위믹스</div></div>
        </div>
        <div class="card-meta"><div class="card-upd" id="upd-wemade">—</div><div class="src-pills" id="pills-wemade"></div></div>
      </div>
      <div class="news-body" id="body-wemade"><div class="sbox"><div class="ldr"></div><span>로드 중...</span></div></div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl">
          <div class="card-ico ic-b">⛓️</div>
          <div><h2>블록체인 / Web3</h2><div class="card-sub">가상자산 · NFT</div></div>
        </div>
        <div class="card-meta"><div class="card-upd" id="upd-blockchain">—</div><div class="src-pills" id="pills-blockchain"></div></div>
      </div>
      <div class="news-body" id="body-blockchain"><div class="sbox"><div class="ldr"></div><span>로드 중...</span></div></div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl">
          <div class="card-ico ic-m">📣</div>
          <div><h2>브랜딩 / 마케팅</h2><div class="card-sub">트렌드 · 인사이트</div></div>
        </div>
        <div class="card-meta"><div class="card-upd" id="upd-marketing">—</div><div class="src-pills" id="pills-marketing"></div></div>
      </div>
      <div class="news-body" id="body-marketing"><div class="sbox"><div class="ldr"></div><span>로드 중...</span></div></div>
    </div>
  </div>

  <div class="section-label">🔥 실시간 트렌드</div>
  <div class="grid-2">
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl">
          <div class="card-ico ic-g">🔍</div>
          <div><h2>구글 급상승 검색어</h2><div class="card-sub">실시간 트렌드</div></div>
        </div>
        <div class="card-meta"><div class="card-upd" id="upd-gtrend">—</div></div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-kr" onclick="switchTrend('kr')">🇰🇷 대한민국</button>
        <button class="tab-btn" id="tab-global" onclick="switchTrend('global')">🌍 글로벌 (US)</button>
      </div>
      <div class="tab-pane active" id="pane-kr"><div class="sbox"><div class="ldr"></div></div></div>
      <div class="tab-pane" id="pane-global"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-ttl">
          <div class="card-ico ic-n">📖</div>
          <div><h2>나무위키 인기 검색어</h2><div class="card-sub">실시간 상위 키워드</div></div>
        </div>
        <div class="card-meta"><div class="card-upd" id="upd-namu">—</div></div>
      </div>
      <div class="trends-pane" id="body-namu"><div class="sbox"><div class="ldr"></div></div></div>
    </div>
  </div>
</div>

<footer>WEMADE Brand Marketing &nbsp;·&nbsp; News Google RSS &nbsp;·&nbsp; Auto Refresh: 30m</footer>

<script>
/* ════════════════════════════════════════════════
   설정 및 유틸리티
   ════════════════════════════════════════════════ */
const QUERIES = {
  wemade: '위메이드 OR 위믹스 OR "WEMIX"',
  blockchain: '블록체인 OR "Web3" OR 가상자산',
  marketing: '마케팅 트렌드 OR 브랜드 캠페인'
};

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nowKST = () => new Date().toLocaleTimeString('ko-KR', {hour12:false});

/* ── CORS 프록시 (AllOrigins) ── */
async function fetchProxy(url) {
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`;
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error('Proxy Server Error');
  const data = await res.json();
  return data.contents;
}

/* ── 시계 및 날짜 ── */
(function updateTime(){
  const now = new Date();
  $('hd-clock').textContent = now.toLocaleTimeString('ko-KR', {hour12:false});
  $('hd-date').textContent = now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
  setTimeout(updateTime, 1000);
})();

/* ── 캐시 시스템 ── */
const _CACHE = {};
function getCache(k, ttl){
  const c = _CACHE[k];
  return c && (Date.now() - c.t < ttl * 1000) ? c.d : null;
}
function setCache(k, d){ _CACHE[k] = {d, t: Date.now()}; }

/* ════════════════════════════════════════════════
   뉴스 로직 (Google News RSS)
   ════════════════════════════════════════════════ */
async function loadNews(cat, force=false) {
  const bodyEl = $(`body-${cat}`), updEl = $(`upd-${cat}`), pillsEl = $(`pills-${cat}`);
  const cached = getCache(`news_${cat}`, 1800);
  
  if (!force && cached) {
    bodyEl.innerHTML = cached.html;
    updEl.textContent = cached.upd;
    pillsEl.innerHTML = '<span class="pll pll-g">G-NEWS</span>';
    return;
  }

  try {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(QUERIES[cat])}&hl=ko&gl=KR&ceid=KR:ko`;
    const xmlText = await fetchProxy(rssUrl);
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");
    const items = xml.querySelectorAll("item");
    
    let html = '';
    items.forEach((item, i) => {
      if(i >= 10) return;
      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;
      const pubDate = new Date(item.querySelector("pubDate").textContent).toLocaleDateString();
      const source = item.querySelector("source")?.textContent || "Google News";
      
      html += `
        <div class="ni">
          <a href="${link}" target="_blank">${esc(title)}</a>
          <div class="ni-meta">
            <span class="ni-src">${esc(source)}</span>
            <span class="ni-time">${pubDate}</span>
            <span class="ni-badge">NEWS</span>
          </div>
        </div>`;
    });

    const updText = nowKST();
    bodyEl.innerHTML = html || '<div class="sbox">기사가 없습니다.</div>';
    updEl.textContent = updText;
    pillsEl.innerHTML = '<span class="pll pll-g">G-NEWS</span>';
    setCache(`news_${cat}`, {html, upd: updText});
  } catch (e) {
    bodyEl.innerHTML = `<div class="errbox
