name: Generate Newsletter Content

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 09:00 KST (= UTC 00:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install requests

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch data
        run: python3 fetch_data.py

      - name: Generate newsletter content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate_newsletter_content.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json pending_articles.json
          git diff --cached --quiet || git commit -m "chore: weekly newsletter content [skip ci]"
          git push
